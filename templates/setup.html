<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>GCP Watchdog | 初始化管理员</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.06);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.3);
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 36px 30px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 10px var(--primary-glow);
      background: rgba(255, 255, 255, 0.05);
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn:hover {
      background: #2563eb;
      box-shadow: 0 4px 15px var(--primary-glow);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>初始化管理员</h2>
    <div class="subtitle">欢迎使用！请为系统创建管理员凭证</div>
    
    <div class="error-msg" id="errorMsg"></div>
    
    <form id="setupForm" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="username">管理员用户名</label>
        <input type="text" id="username" class="form-control" placeholder="输入用户名" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">设置登录密码</label>
        <input type="password" id="password" class="form-control" placeholder="至少 6 位字符" required>
      </div>
      <div class="form-group">
        <label for="confirm_password">确认登录密码</label>
        <input type="password" id="confirm_password" class="form-control" placeholder="再次输入密码" required>
      </div>
      <button type="submit" class="btn">创建管理员账号</button>
    </form>
  </div>
</div>

<script>
  async function handleSubmit(e) {
    e.preventDefault();
    const errorEl = document.getElementById('errorMsg');
    errorEl.style.display = 'none';
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    
    if (password !== confirm) {
      errorEl.innerText = '两次输入的密码不一致';
      errorEl.style.display = 'block';
      return;
    }
    
    try {
      const resp = await fetch('/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await resp.json();
      if (data.ok) {
        window.location.href = '/';
      } else {
        errorEl.innerText = data.error;
        errorEl.style.display = 'block';
      }
    } catch(err) {
      errorEl.innerText = '连接服务器失败: ' + err.message;
      errorEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
